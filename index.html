<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Malin Alexandru</title>
    <meta name="description" content="Malin Alexandru construieste experiente digitale elegante si solutii software personalizate, transformand idei curajoase in produse memorabile." />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; min-height: 100%; }
      body {
        min-height: 100dvh;
        overflow: hidden;
      }
      .scene {
        position: relative;
        width: 100%;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 50% 6%, rgba(255, 255, 255, 0.75), transparent 42%),
          linear-gradient(180deg, #94d5ff 0%, #6eb9f2 45%, #3f84c8 100%);
      }
      .cloud {
        position: absolute;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.45);
        filter: blur(1px);
        animation: drift 26s linear infinite;
      }
      .cloud::before, .cloud::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.45);
      }
      .cloud--one {
        width: 220px; height: 56px;
        top: 18%; left: -12%;
      }
      .cloud--one::before {
        width: 95px; height: 66px;
        left: 26px; top: -30px;
      }
      .cloud--one::after {
        width: 90px; height: 54px;
        right: 28px; top: -20px;
      }
      .cloud--two {
        width: 180px; height: 48px;
        top: 30%; left: -20%;
        animation-duration: 32s;
        animation-delay: -8s;
      }
      .cloud--two::before {
        width: 80px; height: 54px;
        left: 20px; top: -24px;
      }
      .cloud--two::after {
        width: 82px; height: 42px;
        right: 20px; top: -16px;
      }
      .cloud--three {
        width: 260px; height: 64px;
        top: 10%; left: -24%;
        animation-duration: 40s;
        animation-delay: -15s;
      }
      .cloud--three::before {
        width: 112px; height: 72px;
        left: 30px; top: -36px;
      }
      .cloud--three::after {
        width: 112px; height: 56px;
        right: 32px; top: -24px;
      }
      .tree {
        width: min(58vw, 440px);
        height: auto;
        max-height: 86dvh;
        filter: drop-shadow(0 16px 30px rgba(5, 37, 72, 0.35));
        transform: translateY(3%);
      }
      @keyframes drift {
        0% { transform: translateX(0); }
        100% { transform: translateX(132vw); }
      }
      @media (max-width: 700px) {
        .tree { width: min(74vw, 350px); }
      }
    </style>
  </head>
  <body>
    <main class="scene" aria-label="Copac pe fundal de cer">
      <div class="cloud cloud--one"></div>
      <div class="cloud cloud--two"></div>
      <div class="cloud cloud--three"></div>
      <img class="tree" src="20771654_x0w5_eydt_210607.svg" alt="Copac" />
    </main>
  </body>
</html>
